<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Testing Transactions API</h1>
    <div id="result">Loading...</div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('/api/admin/orders', {
                    headers: { 'Accept': 'application/json' },
                    credentials: 'same-origin',
                });
                
                console.log('Status:', response.status);
                const data = await response.json();
                console.log('Data:', data);
                
                document.getElementById('result').innerHTML = `
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Total Orders:</strong> ${Array.isArray(data) ? data.length : (data.data ? data.data.length : 0)}</p>
                    <pre>${JSON.stringify(data.slice(0, 1), null, 2)}</pre>
                `;
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('result').innerHTML = `<p style="color: red;"><strong>Error:</strong> ${e.message}</p>`;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
